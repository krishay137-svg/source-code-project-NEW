<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | EduShare</title>

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

<header>

<nav class="navbar">

<div class="logo">

<a href="/">EduShare</a>

</div>

</nav>

</header>

<section class="hero">

<div class="hero-content">

<h1>Login</h1>

<form action="/login" method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<br><br>

<input
type="password"
name="password"
placeholder="Password"
required>

<br><br>

<button
class="btn primary-btn"
type="submit">

Login

</button>

</form>

<p>

Don't have an account?

<a href="/register">

Register

</a>

</p>

</div>

</section>

<script src="/js/main.js"></script>

</body>

</html>
