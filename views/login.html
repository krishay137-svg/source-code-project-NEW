<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Login to your EduShare account to access and share study notes.">

    <title>Login | EduShare</title>

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

    <header>

        <nav class="navbar">

            <div class="logo">

                <a href="/">EduShare</a>

            </div>

            <ul class="nav-links">

                <li><a href="/register">Register</a></li>

            </ul>

        </nav>

    </header>

    <main class="auth-page">

        <div class="auth-card">

            <div class="auth-header">

                <h1>Welcome Back</h1>

                <p>Sign in to continue learning and sharing</p>

            </div>

            <div id="auth-alert" class="auth-alert" role="alert" aria-live="polite"></div>

            <form id="login-form" class="auth-form" action="/login" method="POST" novalidate>

                <div class="form-group">

                    <label for="email">Email Address</label>

                    <input
                        id="email"
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required
                    >

                    <span class="field-error" id="email-error"></span>

                </div>

                <div class="form-group">

                    <label for="password">Password</label>

                    <div class="input-wrapper">

                        <input
                            id="password"
                            type="password"
                            name="password"
                            placeholder="Enter your password"
                            autocomplete="current-password"
                            required
                        >

                        <button type="button" class="toggle-password" aria-label="Show or hide password" data-target="password">&#128065;</button>

                    </div>

                    <span class="field-error" id="password-error"></span>

                </div>

                <button id="login-btn" class="btn auth-btn" type="submit">

                    Login

                </button>

            </form>

            <p class="auth-switch">

                Don't have an account? <a href="/register">Register here</a>

            </p>

        </div>

    </main>

    <script src="/js/auth.js"></script>

    <script src="/js/main.js"></script>

</body>

</html>
