<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>404 | Page Not Found</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{

            display:flex;
            justify-content:center;
            align-items:center;

            height:100vh;

            background:#f5f7fb;

        }

        .container{

            text-align:center;

        }

        h1{

            font-size:90px;
            color:#1f3c88;

        }

        h2{

            margin:20px 0;

            color:#333;

        }

        p{

            color:#666;

            margin-bottom:30px;

        }

        a{

            text-decoration:none;

            background:#1f3c88;

            color:white;

            padding:15px 35px;

            border-radius:8px;

            transition:.3s;

        }

        a:hover{

            background:#16306f;

        }

    </style>

</head>

<body>

<div class="container">

    <h1>404</h1>

    <h2>Page Not Found</h2>

    <p>

        The page you are looking for doesn't exist.

    </p>

    <a href="/">

        Return Home

    </a>

</div>

</body>

</html>
