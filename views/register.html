<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description" content="Create your free EduShare account and start sharing study notes with students worldwide.">

    <title>Register | EduShare</title>

    <link rel="stylesheet" href="/css/style.css">

</head>

<body>

    <header>

        <nav class="navbar">

            <div class="logo">

                <a href="/">EduShare</a>

            </div>

            <ul class="nav-links">

                <li><a href="/">Home</a></li>

                <li><a href="/login">Login</a></li>

            </ul>

        </nav>

    </header>

    <main class="auth-page">

        <div class="auth-card">

            <div class="auth-header">

                <h1>Create Account</h1>

                <p>Join thousands of students sharing knowledge</p>

            </div>

            <div id="auth-alert" class="auth-alert" role="alert" aria-live="polite"></div>

            <form id="register-form" class="auth-form" action="/register" method="POST" novalidate>

                <div class="form-group">

                    <label for="full_name">Full Name</label>

                    <input
                        id="full_name"
                        type="text"
                        name="full_name"
                        placeholder="Enter your full name"
                        autocomplete="name"
                        required
                        minlength="2"
                        maxlength="100"
                    >

                    <span class="field-error" id="full_name-error"></span>

                </div>

                <div class="form-group">

                    <label for="email">Email Address</label>

                    <input
                        id="email"
                        type="email"
                        name="email"
                        placeholder="Enter your email"
                        autocomplete="email"
                        required
                    >

                    <span class="field-error" id="email-error"></span>

                </div>

                <div class="form-group">

                    <label for="password">Password</label>

                    <div class="input-wrapper">

                        <input
                            id="password"
                            type="password"
                            name="password"
                            placeholder="Min. 8 chars, 1 uppercase, 1 number"
                            autocomplete="new-password"
                            required
                            minlength="8"
                        >

                        <button type="button" class="toggle-password" aria-label="Show or hide password" data-target="password">&#128065;</button>

                    </div>

                    <span class="field-error" id="password-error"></span>

                </div>

                <div class="form-group">

                    <label for="confirm_password">Confirm Password</label>

                    <div class="input-wrapper">

                        <input
                            id="confirm_password"
                            type="password"
                            name="confirm_password"
                            placeholder="Re-enter your password"
                            autocomplete="new-password"
                            required
                        >

                        <button type="button" class="toggle-password" aria-label="Show or hide password" data-target="confirm_password">&#128065;</button>

                    </div>

                    <span class="field-error" id="confirm_password-error"></span>

                </div>

                <button id="register-btn" class="btn auth-btn" type="submit">

                    Create Account

                </button>

            </form>

            <p class="auth-switch">

                Already have an account? <a href="/login">Login here</a>

            </p>

        </div>

    </main>

    <script src="/js/auth.js"></script>

    <script src="/js/main.js"></script>

</body>

</html>
